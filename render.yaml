databases:
  - name: activity-tracker-db
    databaseName: daily_tracker
    user: daily_tracker_user
    plan: free

services:
  - type: web
    name: activity-tracker-backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn daily_tracker_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: activity-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: PYTHON_VERSION
        value: "3.9.0"
